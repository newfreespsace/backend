services:
  db:
    image: mariadb:10.11
    container_name: lyrio-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: lyrio
      MARIADB_USER: lyrio
      MARIADB_PASSWORD: lyrio
    ports:
      - "3306:3306"
    volumes:
      - lyrio-db-data:/var/lib/mysql

  
  redis:
    image: redis:7-alpine
    container_name: lyrio-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - lyrio-redis-data:/data
    command: redis-server --appendonly yes


  minio:
    image: minio/minio:latest
    container_name: lyrio-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # Web/客户端访问端口
      - "9001:9001"   # MinIO 控制台端口
    volumes:
      - lyrio-minio-data:/data
    command: server /data --console-address ":9001"

volumes:
  lyrio-db-data:
  lyrio-redis-data:
  lyrio-minio-data: